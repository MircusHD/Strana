name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Instalare Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalare dependențe
        run: |
          pip install customtkinter yt-dlp Pillow pyinstaller

      - name: Descărcare ffmpeg pentru Windows
        run: |
          curl -L -o ffmpeg.zip "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          tar -xf ffmpeg.zip --strip-components=2 "ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe"

      - name: Compilare cu PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name Strana `
            --collect-data customtkinter `
            --add-binary "ffmpeg.exe;." `
            strana.py

      - name: Upload Strana.exe
        uses: actions/upload-artifact@v4
        with:
          name: Strana-Windows
          path: dist/Strana.exe
          retention-days: 30