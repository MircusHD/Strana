name: Build Windows EXE

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Instalare Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalare dependențe
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter Pillow pyinstaller
          pip install -U yt-dlp

      - name: Descărcare ffmpeg pentru Windows
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          Copy-Item "ffmpeg_tmp\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" -Destination "ffmpeg.exe"
          Remove-Item ffmpeg.zip, ffmpeg_tmp -Recurse -Force

      - name: Compilare cu PyInstaller
        run: >
          pyinstaller
          --onefile
          --noconsole
          --name Strana
          --collect-data customtkinter
          --add-binary "ffmpeg.exe;."
          strana.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Strana-Windows
          path: dist/Strana.exe
          retention-days: 30

      - name: Atașare la Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Strana.exe